<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISS Mission Control | Real-Time Intelligence</title>
  <meta name="description" content="High-performance ISS tracker and space news intelligence dashboard." />
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <header class="main-header">
    <div class="header-content">
      <div class="logo-area">
        <span class="mission-status">MISSION CONTROL DASHBOARD</span>
        <h1>Real-Time ISS and News Intelligence</h1>
      </div>
      <button id="theme-toggle" class="btn btn-outline theme-switcher">
        <span class="theme-icon">🌙</span>
        <span class="theme-text">Switch to Light</span>
      </button>
    </div>
  </header>

  <main class="dashboard-grid">
    
    <!-- TOP SECTION: MAP & ISS STATS -->
    <section class="card map-card">
      <div class="card-header">
        <h2>ISS Live Tracking</h2>
        <div class="header-actions">
          <button id="iss-refresh-btn" class="btn btn-sm btn-primary">Refresh Now</button>
          <span id="auto-refresh-toggle" class="badge badge-success">Auto-Refresh: ON</span>
        </div>
      </div>
      
      <div class="iss-stats-row">
        <div class="stat-item">
          <label>LATITUDE / LONGITUDE</label>
          <div id="iss-coords" class="stat-value">Loading...</div>
        </div>
        <div class="stat-item">
          <label>SPEED</label>
          <div id="iss-speed" class="stat-value">Loading...</div>
        </div>
        <div class="stat-item">
          <label>NEAREST PLACE</label>
          <div id="iss-location" class="stat-value truncate">Loading...</div>
        </div>
        <div class="stat-item">
          <label>TRACKED POSITIONS</label>
          <div id="iss-tracked" class="stat-value highlight">0</div>
        </div>
      </div>

      <div id="iss-map" class="map-container"></div>
    </section>

    <!-- RIGHT SECTION: CHARTS & ASTROS -->
    <aside class="side-stack">
      <section class="card chart-card">
        <div class="card-header">
          <h2>ISS Speed Trend</h2>
        </div>
        <div class="chart-container">
          <canvas id="speed-chart"></canvas>
        </div>
      </section>

      <section class="card astronauts-card">
        <div class="card-header">
          <h2>People in Space</h2>
          <span id="astro-count" class="badge">0</span>
        </div>
        <div id="astronauts-list" class="astronauts-list scrollable">
          <!-- Populated by JS -->
          <div class="spinner"></div>
        </div>
      </section>
    </aside>

    <!-- BOTTOM SECTION: NEWS & DISTRIBUTION -->
    <section class="card news-card">
      <div class="card-header">
        <h2>Breaking News</h2>
        <div class="header-actions">
          <button id="news-refresh-btn" class="btn btn-sm btn-outline">Refresh</button>
        </div>
      </div>
      
      <div class="news-filters">
        <input type="text" id="news-search" placeholder="Search title, source, author..." class="input-search" />
        <select id="news-sort" class="select-sort">
          <option value="date">Sort by Date</option>
          <option value="source">Sort by Source</option>
        </select>
      </div>

      <div id="news-list" class="news-list scrollable">
        <!-- Populated by JS -->
        <div class="spinner"></div>
      </div>
    </section>

    <section class="card distribution-card">
      <div class="card-header">
        <h2>News Distribution</h2>
      </div>
      <div class="chart-container doughnut">
        <canvas id="news-chart"></canvas>
      </div>
      <p class="chart-legend">Distribution by news category</p>
    </section>

  </main>

  <!-- FLOATING CHATBOT -->
  <div id="chatbot-container" class="chatbot-container">
    <button id="chatbot-toggle" class="chatbot-trigger">
      <span class="chat-icon">💬</span>
    </button>
    
    <div id="chatbot-window" class="chatbot-window chatbot-hidden">
      <div class="chatbot-header">
        <div class="bot-info">
          <span class="bot-status"></span>
          <h3>Mission AI</h3>
        </div>
        <div class="bot-actions">
          <button id="chat-clear" title="Clear Chat">🗑️</button>
          <button id="chatbot-close">✕</button>
        </div>
      </div>
      <div id="chat-messages" class="chat-messages">
        <!-- Messages here -->
      </div>
      <div id="chat-typing" class="chat-typing hidden">
        <span></span><span></span><span></span>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask about ISS or News..." rows="1"></textarea>
        <button id="chat-send" class="btn-send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
